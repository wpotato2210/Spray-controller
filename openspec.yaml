system:
  name: spray_controller
  control_model: global_flow

flow:
  sensor:
    type: single
    model: YF-S201C
    unit: L_per_min
  formula: "(speed_kmh * activeWidth_m * targetRate_lpha) / 600"

sections:
  type: binary
  count: 3
  width_m: 0.5

pump:
  control: pwm
  voltage: 12V
  pwm_range: [0, 255]

mcu:
  type: arduino_nano
  logic_voltage: 5V

inputs:
  speed:
    source: wheel_sensor
    unit: km_per_hour
  run_hold:
    type: digital

outputs:
  pump_pwm:
    unit: duty_0_255
  sections:
    type: digital_on_off
