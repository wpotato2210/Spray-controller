name: Validate

on:
  push:
  pull_request:

jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install yamllint==1.35.1 PyYAML==6.0.2

      - name: Run deterministic validation
        run: bash scripts/run_validation_and_capture.sh

      - name: Upload validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: validation-pass
          path: validation/validation_pass.txt
          if-no-files-found: error
