name: Arduino CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - fqbn: "arduino:avr:nano"
            log_name: "arduino-avr-nano"
          - fqbn: "arduino:avr:uno"
            log_name: "arduino-avr-uno"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Arduino CLI core
        run: |
          chmod +x ./ci/setup-arduino-cli.sh
          ./ci/setup-arduino-cli.sh

      - name: Compile sketch
        env:
          FQBN: ${{ matrix.fqbn }}
          LOG_FILE: artifacts/${{ matrix.log_name }}.log
        run: |
          chmod +x ./ci/compile-sketch.sh
          ./ci/compile-sketch.sh

      - name: Upload compiler logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-log-${{ matrix.log_name }}
          path: artifacts/${{ matrix.log_name }}.log
