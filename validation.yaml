rules:
  control_model:
    must_be: global_flow

  flow_sensor:
    count: 1

  section_control:
    type: binary_only

  disallowed:
    - per_section_flow_control
    - multiple_independent_pumps

units:
  speed: km_per_hour
  flow: L_per_min
  rate: L_per_hectare

consistency_checks:
  - md_vs_headers
  - headers_vs_yaml
  - protocols_consistency
  - pin_conflicts

pin_allocation:
  ui_inputs:
    mega2560:
      encoder_clk: 30
      encoder_dt: 31
      encoder_sw: 32
      button_up: 46
      button_down: 47
      button_cal: 48
      button_select: 49
      button_auto_manual: 50
    uno:
      encoder_clk: unassigned
      encoder_dt: unassigned
      encoder_sw: unassigned
      button_up: unassigned
      button_down: unassigned
      button_cal: unassigned
      button_select: unassigned
      button_auto_manual: unassigned
    nano:
      encoder_clk: unassigned
      encoder_dt: unassigned
      encoder_sw: unassigned
      button_up: unassigned
      button_down: unassigned
      button_cal: unassigned
      button_select: unassigned
      button_auto_manual: unassigned
