profiles:
  arduino_avr_nano:
    wheel_sensor: 2
    flow_sensor: 3
    pump_pwm: 9

    boom_sections:
      section_1: 12
      section_2: 7
      section_3: A1

    leds:
      section_1: A2

    switches:
      run_hold: A3
      section_switches:
        section_1: A4
        section_2: A5
        section_3: 4  # Nano-safe: avoids A6/A7 analog-only pins

    lcd:
      interface: spi
      clk: 13
      mosi: 11
      cs: 10
      reset: 8

  arduino_avr_uno:
    wheel_sensor: 2
    flow_sensor: 3
    pump_pwm: 9

    boom_sections:
      section_1: 12
      section_2: 7
      section_3: A1

    leds:
      section_1: A2

    switches:
      run_hold: A3
      section_switches:
        section_1: A4
        section_2: A5
        section_3: 4  # Uno/Nano shared safe digital input

    lcd:
      interface: spi
      clk: 13
      mosi: 11
      cs: 10
      reset: 8

  arduino_avr_mega2560:
    wheel_sensor: 18
    flow_sensor: 19
    pump_pwm: 44

    boom_sections:
      section_1: 22
      section_2: 23
      section_3: 24

    leds:
      section_1: 25

    switches:
      run_hold: 26
      section_switches:
        section_1: 27
        section_2: 28
        section_3: 29

    pressure_sensor: A8

    lcd:
      interface: spi
      clk: 52
      mosi: 51
      cs: 53
      reset: 49
