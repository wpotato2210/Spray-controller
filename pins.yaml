profiles:
  arduino_avr_nano:
    wheel_sensor: 2
    flow_sensor: 3
    pump_pwm: 11

    boom_sections:
      section_1: 12
      section_2: 13
      section_3: A1

    leds:
      section_1: A2

    switches:
      run_hold: A3
      section_switches:
        section_1: A4
        section_2: A5
        section_3: 4  # Nano-safe: avoids A6/A7 analog-only pins

  arduino_avr_uno:
    wheel_sensor: 2
    flow_sensor: 3
    pump_pwm: 11

    boom_sections:
      section_1: 12
      section_2: 13
      section_3: A1

    leds:
      section_1: A2

    switches:
      run_hold: A3
      section_switches:
        section_1: A4
        section_2: A5
        section_3: 4  # Uno/Nano shared safe digital input

  arduino_avr_mega2560:
    # BLOCKED from D22-D53/A8-A15-only policy under current firmware:
    # flow/wheel rely on attachInterrupt(digitalPinToInterrupt(pin)).
    # On Mega2560 external interrupts are fixed to D2, D3, D18, D19, D20, D21.
    wheel_sensor: 18
    flow_sensor: 19
    # PWM required for pump output (Mega PWM-capable in requested range: D44-D46).
    pump_pwm: 44

    boom_sections:
      section_1: 22
      section_2: 23
      section_3: 24

    leds:
      section_1: 25

    switches:
      run_hold: 26
      section_switches:
        section_1: 27
        section_2: 28
        section_3: 29

    pressure_sensor: A8
